<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroadCast Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#313338;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:900px;
    height:700px;
    background:#2b2d31;
    border-radius:15px;
    overflow:hidden;
    display:flex;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.sidebar{
    width:220px;
    background:#1e1f22;
    padding:20px;
}

.sidebar h2{
    color:#5865F2;
    margin-bottom:20px;
}

.status{
    color:#57F287;
    font-size:14px;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    background:#232428;
    padding:20px;
    border-bottom:1px solid #3f4147;
}

.header h3{
    color:#fff;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    background:#404249;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    animation:fade .2s ease;
}

.you{
    background:#5865F2;
}

.system{
    background:#1e1f22;
    color:#57F287;
}

.input-area{
    display:flex;
    gap:10px;
    padding:20px;
    background:#232428;
}

input{
    border:none;
    outline:none;
    border-radius:8px;
    padding:12px;
    background:#383a40;
    color:white;
}

#username{
    width:180px;
}

#message{
    flex:1;
}

button{
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    padding:12px 20px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#4752c4;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<div class="chat-container">

    <div class="sidebar">
        <h2>BroadCast</h2>

        <p class="status">
            🟢 Online
        </p>

        <br>

        <input id="username" placeholder="Username">
        <br><br>
        <button onclick="connect()">Connect</button>
    </div>

    <div class="main">

        <div class="header">
            <h3># general-chat</h3>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-area">
            <input id="message" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>

let socket;
let username = "";

function addMessage(text,type="normal"){

    const messages=document.getElementById("messages");

    const div=document.createElement("div");

    div.classList.add("message");

    if(type==="you")
        div.classList.add("you");

    if(type==="system")
        div.classList.add("system");

    div.innerText=text;

    messages.appendChild(div);

    messages.scrollTop=messages.scrollHeight;
}

function connect(){

    if(socket && socket.readyState===WebSocket.OPEN){
        addMessage("Already connected","system");
        return;
    }

    username=document.getElementById("username").value || "Anonymous";

    socket=new WebSocket("ws://localhost:8080/chat");

    socket.onopen=()=>{
        addMessage("Connected to server","system");
        socket.send(username + " joined the chat");
    };

    socket.onmessage=(event)=>{
        addMessage(event.data);
    };

    socket.onclose=()=>{
        addMessage("Disconnected","system");
    };

    socket.onerror=()=>{
        addMessage("Connection error","system");
    };
}

function sendMessage(){

    if(!socket || socket.readyState!==WebSocket.OPEN){
        alert("Connect first");
        return;
    }

    const input=document.getElementById("message");

    const msg=input.value.trim();

    if(msg==="")
        return;

    socket.send(username + ": " + msg);

    addMessage("You: " + msg,"you");

    input.value="";
}

document.getElementById("message")
.addEventListener("keypress",function(e){

    if(e.key==="Enter")
        sendMessage();

});

</script>

</body>
</html>
